<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Huang Cheng-yu</title>
    <style>
        /* 當代藝廊極簡視覺風格 */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fcfcfc; /* 藝廊微暖白 */
            color: #111111;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            width: 100%;
            max-width: 1200px;
            padding: 30px 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info h1 {
            font-size: 1.5rem;
            font-weight: 500;
            margin: 0;
            letter-spacing: 1px;
        }

        .info p {
            font-size: 0.9rem;
            color: #666;
            margin: 5px 0 0 0;
        }

        /* 下載按鈕 */
        .btn-download {
            display: inline-block;
            padding: 10px 20px;
            border: 1px solid #111;
            background-color: transparent;
            color: #111;
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
        }

        .btn-download:hover {
            background-color: #111;
            color: #fff;
        }

        /* 雙頁畫冊主容器：讓面試官像看實體書一樣往下滾動 */
        .book-layout {
            width: 100%;
            max-width: 1400px;
            padding: 0 20px 50px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 50px;
        }

        /* 封面與封底：單頁完美置中 */
        .single-page-block {
            width: 48%;
            max-width: 600px;
            height: 82vh;
            border: 1px solid #e3e3e3;
            box-shadow: 0 6px 16px rgba(0,0,0,0.04);
            background: #fff;
        }

        /* 內頁：左右完美並排對開 */
        .spread-block {
            width: 100%;
            height: 82vh;
            display: flex;
            justify-content: center;
            gap: 4px; /* 書籍中縫微陰影感 */
        }

        .spread-left, .spread-right {
            width: 48%;
            max-width: 600px;
            height: 100%;
            border: 1px solid #e3e3e3;
            box-shadow: 0 6px 16px rgba(0,0,0,0.04);
            background: #fff;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 手機板自動彈性切換為單頁直式滾動，排版不擠壓 */
        @media (max-width: 900px) {
            .single-page-block { width: 100%; }
            .spread-block { flex-direction: column; height: auto; gap: 20px; }
            .spread-left, .spread-right { width: 100%; height: 82vh; }
        }
    </style>
</head>
<body>

    <header>
        <div class="info">
            <h1>HUANG CHENG-YU</h1>
            <p>Architecture, Spatial Design & Curation · Portfolio</p>
        </div>
        <a href="https://drive.google.com/file/d/168tyOLU7ATKv_WAzLowzdNmtyZ8RsDkw/view?usp=sharing" target="_blank" class="btn-download">DOWNLOAD FULL PDF</a>
    </header>

    <main class="book-layout">
        
        <div class="single-page-block">
            <iframe src="portfolio.pdf#page=1&zoom=page-fit&toolbar=0&navpanes=0"></iframe>
        </div>

        <div class="spread-block">
            <div class="spread-left">
                <iframe src="portfolio.pdf#page=2&zoom=page-fit&toolbar=0&navpanes=0"></iframe>
            </div>
            <div class="spread-right">
                <iframe src="portfolio.pdf#page=3&zoom=page-fit&toolbar=0&navpanes=0"></iframe>
            </div>
        </div>

        <div class="spread-block">
            <div class="spread-left">
                <iframe src="portfolio.pdf#page=4&zoom=page-fit&toolbar=0&navpanes=0"></iframe>
            </div>
            <div class="spread-right">
                <iframe src="portfolio.pdf#page=5&zoom=page-fit&toolbar=0&navpanes=0"></iframe>
            </div>
        </div>

        <div class="single-page-block">
            <iframe src="portfolio.pdf#page=6&zoom=page-fit&toolbar=0&navpanes=0"></iframe>
        </div>

    </main>

</body>
</html>
