<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Huang Cheng-yu</title>
    <style>
        /* 當代藝廊極簡視覺風格 */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fcfcfc; /* 藝廊微暖白 */
            color: #111111;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* 防止整個網頁大視窗亂滾動 */
        }

        header {
            width: 100%;
            max-width: 1200px;
            padding: 30px 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info h1 {
            font-size: 1.5rem;
            font-weight: 500;
            margin: 0;
            letter-spacing: 1px;
        }

        .info p {
            font-size: 0.9rem;
            color: #666;
            margin: 5px 0 0 0;
        }

        /* 精緻極簡的下載按鈕 */
        .btn-download {
            display: inline-block;
            padding: 6px 14px; 
            border: 1px solid #111;
            background-color: transparent;
            color: #111;
            text-decoration: none;
            font-size: 0.75rem; 
            letter-spacing: 0.8px;
            transition: all 0.2s ease;
        }

        .btn-download:hover {
            background-color: #111;
            color: #fff;
        }

        /* 作品集外殼 */
        .pdf-container {
            width: 100%;
            max-width: 1200px;
            height: calc(100vh - 140px);
            padding: 0 20px 30px 20px;
            box-sizing: border-box;
            position: relative;
        }

        /* 💡 終極對齊：懸浮提示字樣與三個點的精準對齊 */
        .top-right-notice {
            position: absolute;
            top: -24px; /* 緊貼在內嵌閱讀器黑邊上方 */
            right: 13px; /* 🌟 核心微調：讓這個點剛好落在三個點的垂直中線上 */
            font-size: 0.8rem;
            color: #888;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            pointer-events: none;
            animation: fadeInOut 2s infinite alternate;
        }

        /* 將「雙頁檢視」與「↓」的距離優雅拉開 */
        .top-right-notice .text-label {
            margin-right: 14px; /* 控制文字與箭頭的橫向距離 */
        }

        .top-right-notice .arrow {
            font-weight: bold;
            display: inline-block;
            transform: scaleX(0.9); /* 讓箭頭線條在視覺上更對齊圓點的中心 */
        }

        @keyframes fadeInOut {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* 滿版原生解碼標籤 */
        embed {
            width: 100%;
            height: 100%;
            border: 1px solid #e0e0e0;
            background-color: #fff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        }

        /* 行動裝置彈性調整 */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
                padding: 20px;
            }
            .pdf-container {
                height: calc(100vh - 180px);
            }
            .top-right-notice {
                display: none;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="info">
            <h1>HUANG CHENG-YU</h1>
            <p>Architecture, Spatial Design & Curation · Portfolio</p>
        </div>
        <a href="https://drive.google.com/file/d/168tyOLU7ATKv_WAzLowzdNmtyZ8RsDkw/view?usp=sharing" target="_blank" class="btn-download">DOWNLOAD FULL PDF</a>
    </header>

    <main class="pdf-container">
        <div class="top-right-notice">
            <span class="text-label">雙頁檢視</span><span class="arrow">↓</span>
        </div>
        
        <embed src="portfolio.pdf#view=Fit&newwindow=0&pagemode=thumbs&page=1&scrollbar=1&toolbar=1&statusbar=0&messages=0&navpanes=0&zoom=page-fit&view=FitH&singlepage=false&twopage=true&bookmode=true" type="application/pdf" style="width:100%; height:100%;">
    </main>

</body>
</html>
