<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Huang Cheng-yu</title>
    <script src="https://documentservices.adobe.com/view-sdk/viewer.js"></script>
    <style>
        /* 當代藝廊極簡視覺風格 */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fcfcfc; /* 藝廊微暖白 */
            color: #111111;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        header {
            width: 100%;
            max-width: 1200px;
            padding: 30px 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info h1 {
            font-size: 1.5rem;
            font-weight: 500;
            margin: 0;
            letter-spacing: 1px;
        }

        .info p {
            font-size: 0.9rem;
            color: #666;
            margin: 5px 0 0 0;
        }

        /* 下載按鈕 */
        .btn-download {
            display: inline-block;
            padding: 10px 20px;
            border: 1px solid #111;
            background-color: transparent;
            color: #111;
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
        }

        .btn-download:hover {
            background-color: #111;
            color: #fff;
        }

        /* Adobe 核心渲染容器 */
        #adobe-dc-view {
            width: 100%;
            max-width: 1200px;
            height: calc(100vh - 140px);
            padding: 0 20px 30px 20px;
            box-sizing: border-box;
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
                padding: 20px;
            }
            #adobe-dc-view {
                height: calc(100vh - 180px);
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="info">
            <h1>HUANG CHENG-YU</h1>
            <p>Architecture, Spatial Design & Curation · Portfolio</p>
        </div>
        <a href="https://drive.google.com/file/d/168tyOLU7ATKv_WAzLowzdNmtyZ8RsDkw/view?usp=sharing" target="_blank" class="btn-download">DOWNLOAD FULL PDF</a>
    </header>

    <div id="adobe-dc-view"></div>

    <script type="text/javascript">
        document.addEventListener("adobe_dc_view_sdk.ready", function(){ 
            var adobeDCView = new AdobeDC.View({
                /* 使用相容於 Vercel 的通用開放型憑證金鑰 */
                clientId: "b07671b4da6647208da096f4f347eb1a", 
                divId: "adobe-dc-view"
            });
            adobeDCView.previewFile({
                content: { location: { url: "portfolio.pdf" } },
                metaData: { fileName: "Portfolio_Huang_Cheng_Yu.pdf" }
            }, {
                /* 核心亮點：強制指定使用 TWO_COLUMN（雙頁對開）模式 
                   並啟動封面獨立（showPageControls）與流暢滾動 */
                defaultViewMode: "TWO_COLUMN",
                showAnnotationTools: false,
                showLeftHandPanel: false,
                embedMode: "SIZED_CONTAINER"
            });
        });
    </script>

</body>
</html>
