<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Huang Cheng-yu</title>
    <style>
        /* 當代藝廊極簡視覺風格 */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fcfcfc; /* 藝廊微暖白 */
            color: #111111;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* 🔒 電腦版與手機版全面鎖定大視窗 */
        }

        header {
            width: 100%;
            max-width: 1200px;
            padding: 30px 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info h1 {
            font-size: 1.5rem;
            font-weight: 500;
            margin: 0;
            letter-spacing: 1px;
        }

        .info p {
            font-size: 0.9rem;
            color: #666;
            margin: 5px 0 0 0;
        }

        /* 精緻極簡的下載按鈕 */
        .btn-download {
            display: inline-block;
            padding: 6px 14px; 
            border: 1px solid #111;
            background-color: transparent;
            color: #111;
            text-decoration: none;
            font-size: 0.75rem; 
            letter-spacing: 0.8px;
            transition: all 0.2s ease;
        }

        .btn-download:hover {
            background-color: #111;
            color: #fff;
        }

        /* 作品集外殼 */
        .pdf-container {
            width: 100%;
            max-width: 1200px;
            height: calc(100vh - 140px);
            padding: 0 20px 30px 20px;
            box-sizing: border-box;
            position: relative;
        }

        /* 精準懸浮在右上角選單按鈕正上方的極簡字樣 */
        .top-right-notice {
            position: absolute;
            top: -26px; 
            right: 8px;  
            font-size: 0.8rem;
            color: #888;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            pointer-events: none;
            animation: fadeInOut 2s infinite alternate;
        }

        .top-right-notice .text-label {
            margin-right: 12px; 
        }

        .top-right-notice .arrow {
            font-weight: bold;
            display: inline-block;
        }

        @keyframes fadeInOut {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* 預設容器樣式 */
        .desktop-viewer {
            display: block;
            width: 100%;
            height: 100%;
        }

        .mobile-viewer {
            display: none; /* 預設電腦版隱藏手機組件 */
        }

        embed, iframe {
            width: 100%;
            height: 100%;
            border: 1px solid #e0e0e0;
            background-color: #fff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        }

        /* 📱 行動裝置（手機）特化分流規則 */
        @media (max-width: 768px) {
            body {
                overflow: hidden !important; /* 🔒 手機版網頁大框架鎖定不晃動 */
            }
            
            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 0px;
                padding: 20px 20px 10px 20px; /* 縮減間距讓畫面更緊湊 */
            }

            /* 🌟 核心修正 1：在手機上把下載按鈕完全拿掉，不佔空間 */
            .btn-download {
                display: none !important;
            }

            /* 🌟 核心修正 2：確保標題文字保持正常可見，並微調字型大小 */
            .info h1 {
                font-size: 1.3rem;
            }
            .info p {
                font-size: 0.8rem;
            }

            .pdf-container {
                height: calc(100vh - 100px); /* 扣除縮減後的標題高度 */
                padding: 0 15px 15px 15px;
            }

            .desktop-viewer {
                display: none !important;
            }

            .mobile-viewer {
                display: block !important;
                width: 100%;
                height: 100%;
                overflow: auto !important; /* 只允許內嵌預覽器可滾動 */
                -webkit-overflow-scrolling: touch;
            }

            .top-right-notice {
                display: none;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="info">
            <h1>HUANG CHENG-YU</h1>
            <p>Architecture, Spatial Design & Curation · Portfolio</p>
        </div>
        <!-- 這個按鈕在手機上會自動隱藏，電腦上依然保留 -->
        <a href="https://drive.google.com/file/d/168tyOLU7ATKv_WAzLowzdNmtyZ8RsDkw/view?usp=sharing" target="_blank" class="btn-download">DOWNLOAD FULL PDF</a>
    </header>

    <main class="pdf-container">
        <!-- 💻 電腦桌機版 -->
        <div class="desktop-viewer">
            <div class="top-right-notice">
                <span class="text-label">雙頁檢視</span><span class="arrow">↙</span>
            </div>
            <embed src="portfolio.pdf#view=Fit&newwindow=0&pagemode=thumbs&page=1&scrollbar=1&toolbar=1&statusbar=0&messages=0&navpanes=0&zoom=page-fit&view=FitH&singlepage=false&twopage=true&bookmode=true" type="application/pdf">
        </div>

        <!-- 💡 手機行動版 -->
        <div class="mobile-viewer">
            <iframe src="https://drive.google.com/file/d/168tyOLU7ATKv_WAzLowzdNmtyZ8RsDkw/preview" allow="autoplay"></iframe>
        </div>
    </main>

</body>
</html>
